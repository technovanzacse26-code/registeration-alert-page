<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registration Notice</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 60px 80px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    }

    .icon {
      font-size: 60px;
      margin-bottom: 20px;
    }

    .label {
      text-transform: uppercase;
      letter-spacing: 4px;
      font-size: 13px;
      color: #a0aec0;
      margin-bottom: 16px;
    }

    .message {
      font-size: 42px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 10px;
    }

    .message span {
      color: #63b3ed;
    }

    .sub {
      font-size: 15px;
      color: #718096;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🕗</div>
    <div class="label">Notice</div>
    <div class="message">Registration starts at <span>9 PM</span></div>

  </div>
</body>
</html>
